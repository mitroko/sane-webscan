<!DOCTYPE html>
<html>
<head>
  <title>Batch Scan</title>
  <script>
    async function pollStatus() {
      try {
        let res = await fetch('/poll');
        let status = document.getElementById("status");

        if (res.status === 201) {
            status.innerText = "ready";
        } else if (res.status === 202) {
            status.innerText = "in progress";
        } else {
            status.innerText = "idle";
        }
      } catch (e) {
          document.getElementById("status").innerText = "error";
      }
    }

    setInterval(pollStatus, 2000);
    window.onload = pollStatus;
  </script>
</head>
<body>
  <table width="100%" height="100%">
    <tr>
      <td align="center" valign="middle">
        <div id="status">checking...</div><br><br>

        <form>
          <button formaction="/next" formmethod="GET">next</button>
          <button formaction="/done" formmethod="GET">done</button>
        </form>
      </td>
    </tr>
  </table>
</body>
</html>

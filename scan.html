<!DOCTYPE html>
<html>
<head>
  <title>SANE Web scan</title>
  <meta charset="UTF-8">
  <script>
    async function pollStatus() {
      try {
        let res = await fetch('/poll');

        let status = document.getElementById("status");

        if (res.status === 201) {
          status.innerText = "ready";
          return;
        }

        if (res.status === 202) {
          status.innerText = "in progress";
          return;
        }

        if (res.status === 200) {
          let blob = await res.blob();

          if (blob.size > 0) {
            // Extract filename from header
            let disposition = res.headers.get("Content-Disposition");
            let filename = "scan.jpg";

            if (disposition && disposition.includes("filename=")) {
              filename = disposition.split("filename=")[1].replace(/"/g, "");
            }

            // cleanup cookie
            let cleanupCookie = res.headers.get("X-Cleanup-Cookie");

            // Trigger download
            let url = window.URL.createObjectURL(blob);
            let a = document.createElement("a");
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            a.remove();

            window.URL.revokeObjectURL(url);

            // call cleanup API
            if (cleanupCookie) {
                await fetch('/cleanup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded'
                    },
                    body: 'cleaner_token=' + encodeURIComponent(cleanupCookie)
                });
            }

            // Redirect after download
            window.location.href = "/index.html";
            return;
          }
        }

        status.innerText = "idle";

      } catch (e) {
        document.getElementById("status").innerText = "error";
      }
    }
    setInterval(pollStatus, 2000);
    window.onload = pollStatus;
  </script>
</head>
<body>
  <table width="100%" height="100%">
    <tr>
      <td align="center" valign="middle">
        <div id="status">checking...</div><br><br>
      </td>
    </tr>
  </table>
</body>
</html>
